<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zains Game — Logo Variations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f13; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 48px 32px; }
    h1 { color: #fff; text-align: center; font-size: 22px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
    p.sub { color: #555; text-align: center; font-size: 14px; margin-bottom: 56px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 960px; margin: 0 auto; }
    .card { background: #18181f; border: 1px solid #2a2a35; border-radius: 20px; padding: 48px 32px 32px; display: flex; flex-direction: column; align-items: center; gap: 24px; transition: border-color 0.2s; cursor: pointer; }
    .card:hover { border-color: #3b82f6; }
    .card svg { display: block; }
    .label { color: #888; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .name { color: #fff; font-size: 15px; font-weight: 500; margin-top: 2px; text-align: center; }
  </style>
</head>
<body>
  <h1>Zains Game</h1>
  <p class="sub">4 logo variations — click any to enlarge</p>

  <div class="grid">

    <!-- VARIATION 1: Minimalist ZG Monogram -->
    <div class="card" onclick="enlarge('v1')">
      <svg id="v1" width="280" height="160" viewBox="0 0 280 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background pill -->
        <rect x="0" y="0" width="280" height="160" rx="16" fill="#0d1117"/>
        <!-- Z letter -->
        <text x="74" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="80" font-weight="800" fill="#2563eb" letter-spacing="-4">Z</text>
        <!-- G letter -->
        <text x="142" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-4">G</text>
        <!-- Chart line over top -->
        <polyline points="30,50 65,70 100,35 140,55 180,25 220,42 250,20" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        <circle cx="250" cy="20" r="4" fill="#3b82f6"/>
      </svg>
      <div>
        <div class="label">Variation 1</div>
        <div class="name">ZG Monogram — Dark & Minimal</div>
      </div>
    </div>

    <!-- VARIATION 2: Bold Wordmark -->
    <div class="card" onclick="enlarge('v2')">
      <svg id="v2" width="280" height="160" viewBox="0 0 280 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="280" height="160" rx="16" fill="#0d1117"/>
        <!-- Icon: upward arrow in rounded square -->
        <rect x="16" y="52" width="56" height="56" rx="12" fill="#2563eb"/>
        <!-- Arrow up -->
        <polyline points="44,88 44,64 44,64" stroke="none"/>
        <path d="M30 82 L44 60 L58 82" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="44" y1="60" x2="44" y2="92" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <!-- Wordmark -->
        <text x="84" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-1">ZAINS</text>
        <text x="84" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="500" fill="#3b82f6" letter-spacing="4">GAME</text>
        <!-- Tagline -->
        <text x="84" y="135" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="400" fill="#444" letter-spacing="2">STOCK MARKET RESEARCH</text>
      </svg>
      <div>
        <div class="label">Variation 2</div>
        <div class="name">Bold Wordmark + Icon</div>
      </div>
    </div>

    <!-- VARIATION 3: Premium Badge -->
    <div class="card" onclick="enlarge('v3')">
      <svg id="v3" width="280" height="160" viewBox="0 0 280 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="280" height="160" rx="16" fill="#0a0e1a"/>
        <!-- Hexagon shield -->
        <path d="M140 18 L172 36 L172 72 L140 90 L108 72 L108 36 Z" fill="none" stroke="#c9a84c" stroke-width="2"/>
        <path d="M140 26 L166 41 L166 70 L140 85 L114 70 L114 41 Z" fill="#0f1628"/>
        <!-- Chart inside hex -->
        <polyline points="122,68 130,55 138,62 148,44 158,50" stroke="#c9a84c" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="158" cy="50" r="2.5" fill="#c9a84c"/>
        <!-- Name below -->
        <text x="140" y="112" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">ZAINS</text>
        <text x="140" y="132" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#c9a84c" letter-spacing="6">GAME</text>
        <!-- Stars -->
        <text x="58" y="114" font-size="10" fill="#c9a84c" opacity="0.5">★</text>
        <text x="208" y="114" font-size="10" fill="#c9a84c" opacity="0.5">★</text>
      </svg>
      <div>
        <div class="label">Variation 3</div>
        <div class="name">Premium Badge — Gold & Navy</div>
      </div>
    </div>

    <!-- VARIATION 4: Gradient Modern -->
    <div class="card" onclick="enlarge('v4')">
      <svg id="v4" width="280" height="160" viewBox="0 0 280 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#2563eb"/>
          </linearGradient>
          <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3b82f6"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="280" height="160" rx="16" fill="#09090f"/>
        <!-- Rounded square icon with gradient -->
        <rect x="100" y="18" width="80" height="80" rx="20" fill="url(#grad1)"/>
        <!-- Chart bars inside -->
        <rect x="116" y="68" width="10" height="16" rx="3" fill="white" opacity="0.9"/>
        <rect x="130" y="54" width="10" height="30" rx="3" fill="white" opacity="0.9"/>
        <rect x="144" y="44" width="10" height="40" rx="3" fill="white" opacity="0.9"/>
        <rect x="158" y="58" width="10" height="26" rx="3" fill="white" opacity="0.7"/>
        <!-- Glow -->
        <rect x="100" y="18" width="80" height="80" rx="20" fill="url(#grad2)" opacity="0.15"/>
        <!-- Name -->
        <text x="140" y="122" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="700" fill="#ffffff">Zains Game</text>
        <text x="140" y="142" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="400" fill="#6366f1" letter-spacing="3">INVEST SMARTER</text>
      </svg>
      <div>
        <div class="label">Variation 4</div>
        <div class="name">Gradient Modern — Purple & Blue</div>
      </div>
    </div>

  </div>

  <!-- Lightbox -->
  <div id="overlay" onclick="close()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;cursor:zoom-out;">
    <svg id="enlarged" width="560" height="320" viewBox="0 0 280 160"></svg>
  </div>

  <script>
    function enlarge(id) {
      const src = document.getElementById(id);
      const overlay = document.getElementById('overlay');
      const enlarged = document.getElementById('enlarged');
      enlarged.innerHTML = src.innerHTML;
      overlay.style.display = 'flex';
    }
    function close() {
      document.getElementById('overlay').style.display = 'none';
    }
  </script>
</body>
</html>
